<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>紙幣管理</title>

    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 350px;
        text-align: center;
      }

      h1 {
        margin-bottom: 30px;
      }

      .btn {
        display: block;
        text-decoration: none;
        margin: 15px 0;
        padding: 18px;
        border-radius: 15px;
        font-size: 20px;
        font-weight: bold;
        color: white;
      }

      .exchange {
        background: #06c755;
      }

      .admin {
        background: #2196f3;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>紙幣管理</h1>

      <a class="btn exchange" href="./index.html"> 交換入力 </a>

      <a class="btn admin" href="./admin.html"> 管理画面 </a>
    </div>
  </body>
</html>
