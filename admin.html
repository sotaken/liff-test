<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>管理ページ</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        margin: 0;
        padding: 20px;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      }

      h2 {
        margin-top: 0;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }

      label {
        width: 90px;
        font-weight: bold;
      }

      input {
        width: 80px;
        font-size: 20px;
        padding: 8px;
        text-align: center;
        border: 1px solid #999;
        border-radius: 6px;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 16px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-set {
        background: #06c755;
        color: white;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>初期値セット</h2>

      <div class="row">
        <label>千円札</label>
        <input type="number" id="setS" value="100" />
      </div>

      <div class="row">
        <label>五千円札</label>
        <input type="number" id="setG" value="100" />
      </div>

      <div class="row">
        <label>一万円札</label>
        <input type="number" id="setM" value="100" />
      </div>

      <button class="btn-set" onclick="setInitial()">
        セットして履歴クリア
      </button>
    </div>

    <script>
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbwJs-REqoycbAk5LulP_B2IYrrqa0gHeBH4dr4mwfKO1dfrg7EqP_WdrhfGL0zsZ1j2/exec";

      async function setInitial() {
        const s = document.getElementById("setS").value;
        const g = document.getElementById("setG").value;
        const m = document.getElementById("setM").value;

        const ok = confirm(
          `初期値をセットしますか？

          千円札:${s}
          五千円札:${g}
          一万円札:${m}

          履歴は削除されます`,
        );

        if (!ok) return;

        try {
          await fetch(`${GAS_URL}?action=set&s=${s}&g=${g}&m=${m}`);

          alert("セット完了");
        } catch (err) {
          alert("エラー");
        }
      }

      async function loadHistory() {
        try {
          const response = await fetch(`${GAS_URL}?action=history`);

          const data = await response.json();

          const historyList = document.getElementById("historyList");

          // 履歴なし
          if (data.length === 0) {
            historyList.innerHTML = "履歴がありません";

            return;
          }

          // HTML生成
          historyList.innerHTML = data
            .map((row) => {
              return `
        <div style="
          padding:12px;
          border-bottom:1px solid #eee;
          line-height:1.7;
        ">
          <div>
            ${row[0]}
          </div>

          <div>
            千円:${row[1]}
            五千円:${row[2]}
            一万円:${row[3]}
          </div>
        </div>
      `;
            })
            .join("");
        } catch (err) {
          document.getElementById("historyList").innerHTML = "取得失敗";
        }
      }

      // ページ起動時
      loadHistory();
    </script>
    <div class="card">
      <h2>最新履歴</h2>

      <div id="historyList">読み込み中...</div>
    </div>
  </body>
</html>
