<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫報告くん</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 80%; max-width: 300px; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background-color: #06C755; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        label { font-size: 14px; color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>三刀屋の在庫報告</h3>
        
        <label>ケース数</label><br>
        <input type="number" id="caseInput" value="0" min="0">
        
        <br><label>バラ数</label><br>
        <input type="number" id="baraInput" value="0" min="0">
        
        <button onclick="sendInventory()">報告する</button>
    </div>

    <script>
        async function main() {
            // 2010007265-pkPajbfV
            await liff.init({ liffId: "YOUR_LIFF_ID" });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }
        main();

        async function sendInventory() {
            const caseVal = document.getElementById('caseInput').value;
            const baraVal = document.getElementById('baraInput').value;
            
            // 「三刀屋 ケース数 バラ数」の形式でメッセージを作成
            const messageText = `三刀屋 ${caseVal} ${baraVal}`;

            try {
                await liff.sendMessages([{
                    type: 'text',
                    text: messageText
                }]);
                liff.closeWindow(); // 送信したら自動で画面を閉じる
            } catch (error) {
                alert('エラーが発生しました: ' + error);
            }
        }
    </script>
</body>
</html>
